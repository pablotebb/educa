<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Gestión Documental</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* Estilos de las pestañas */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            color: var(--accent-color);
        }

        .tab-button.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-container {
            margin-bottom: 20px;
            position: relative;
        }

        #searchInput, #searchInputSumario {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus, #searchInputSumario:focus {
            border-color: var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .page-badge {
            background-color: var(--accent-color);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            display: inline-block;
            min-width: 30px;
            text-align: center;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #777;
            font-style: italic;
        }

        .section-header {
            background-color: #ecf0f1;
            font-weight: bold;
        }

        .subsection {
            padding-left: 30px;
        }
    </style>
</head>

        <!-- Pestañas -->

            <button class="tab-button" onclick="switchTab('sumario')">Sumario</button>
        </div>

        <!-- Pestaña 1: Índice de Aplicaciones -->
        <div id="tab-index" class="tab-content active">
            <div class="search-container">

            </div>

            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Título / Descripción</th>
                        <th style="width: 80px;">Página</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Los datos se insertarán aquí mediante JavaScript -->
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">No se encontraron resultados.</div>
        </div>

        <!-- Pestaña 2: Sumario -->

    </div>

        // Elementos del DOM - Tabla 1
        const tableBody = document.getElementById('tableBody');

        // Elementos del DOM - Tabla 2 (Sumario)
        const sumarioBody = document.getElementById('sumarioBody');
        const searchInputSumario = document.getElementById('searchInputSumario');
        const noResultsSumario = document.getElementById('noResultsSumario');

        // Función para cambiar de pestaña
        function switchTab(tabName) {
            // Ocultar todos los contenidos
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Desactivar todos los botones
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Activar la pestaña seleccionada
            document.getElementById('tab-' + tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Renderizar primera tabla
        function renderTable(items) {
            tableBody.innerHTML = '';
            if (items.length === 0) {
                noResultsMsg.style.display = 'block';
                return;
            }
            noResultsMsg.style.display = 'none';

            items.forEach(item => {
                const row = document.createElement('tr');
                
                const titleCell = document.createElement('td');
                titleCell.textContent = item.title;
                
                const pageCell = document.createElement('td');
                const pageDisplay = item.page !== "-" ? item.page : "-";
                pageCell.innerHTML = item.page !== "-" ? `<span class="page-badge">${item.page}</span>` : '-';
                
                row.appendChild(titleCell);
                row.appendChild(pageCell);
                tableBody.appendChild(row);
            });
        }

        // Renderizar tabla del Sumario
        function renderSumarioTable(items) {
            sumarioBody.innerHTML = '';
            if (items.length === 0) {
                noResultsSumario.style.display = 'block';
                return;
            }
            noResultsSumario.style.display = 'none';

            items.forEach(item => {
                const row = document.createElement('tr');
                
                if (item.isSection) {
                    row.classList.add('section-header');
                } else {
                    row.classList.add('subsection');
                }
                
                const titleCell = document.createElement('td');
                titleCell.textContent = item.title;
                
                const pageCell = document.createElement('td');
                pageCell.innerHTML = `<span class="page-badge">${item.page}</span>`;
                
                row.appendChild(titleCell);
                row.appendChild(pageCell);
                sumarioBody.appendChild(row);
            });
        }

        // Filtrar primera tabla
        function filterData(query) {
            const lowerQuery = query.toLowerCase();
            const filtered = data.filter(item => 
                item.title.toLowerCase().includes(lowerQuery) || 
                item.page.toString().includes(lowerQuery)
            );
            renderTable(filtered);
        }

        // Filtrar tabla del Sumario
        function filterSumarioData(query) {
            const lowerQuery = query.toLowerCase();
            const filtered = sumarioData.filter(item => 
                item.title.toLowerCase().includes(lowerQuery) || 
                item.page.toString().includes(lowerQuery)
            );
            renderSumarioTable(filtered);
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            filterData(e.target.value);
        });

        searchInputSumario.addEventListener('input', (e) => {
            filterSumarioData(e.target.value);
        });

        // Ordenar y renderizar datos iniciales
        data.sort((a, b) => {
            if (a.page === "-") return 1;
            if (b.page === "-") return -1;
            return a.page - b.page;
        });
        
        renderTable(data);
        renderSumarioTable(sumarioData);
