<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Gestión Documental</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .search-container {
            margin-bottom: 20px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box; /* Asegura que el padding no desborde el ancho */
        }

        #searchInput:focus {
            border-color: var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .page-badge {
            background-color: var(--accent-color);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            display: inline-block;
            min-width: 30px;
            text-align: center;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #777;
            font-style: italic;
        }
    </style>
</head>

            </thead>
            <tbody id="tableBody">
                <!-- Los datos se insertarán aquí mediante JavaScript -->
            </tbody>
        </table>
        <div id="noResults" class="no-results" style="display: none;">No se encontraron resultados.</div>
    </div>

            { title: "PORTAL DE CENTROS - MANTENIMIENTO DE PERMISOS", page: 88 },
            { title: "FUM Y FCT / PRÁCTICAS DUAL", page: 89 }
        ];

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const noResultsMsg = document.getElementById('noResults');

        function renderTable(items) {
            tableBody.innerHTML = '';
            if (items.length === 0) {
                noResultsMsg.style.display = 'block';
                return;
            }
            noResultsMsg.style.display = 'none';

            items.forEach(item => {
                const row = document.createElement('tr');
                
                const titleCell = document.createElement('td');
                titleCell.textContent = item.title;
                
                const pageCell = document.createElement('td');
                // Si la página es un número, lo mostramos, si no, guión
                const pageDisplay = item.page !== "-" ? item.page : "-";
                pageCell.innerHTML = item.page !== "-" ? `<span class="page-badge">${item.page}</span>` : '-';
                
                row.appendChild(titleCell);
                row.appendChild(pageCell);
                tableBody.appendChild(row);
            });
        }

        function filterData(query) {
            const lowerQuery = query.toLowerCase();
            const filtered = data.filter(item => 
                item.title.toLowerCase().includes(lowerQuery) || 
                item.page.toString().includes(lowerQuery)
            );
            renderTable(filtered);
        }

        // Event Listener para el buscador
        searchInput.addEventListener('input', (e) => {
            filterData(e.target.value);
        });

        // Renderizado inicial
        // Ordenamos los datos por número de página para que sea más útil
        data.sort((a, b) => {
            if (a.page === "-") return 1;
            if (b.page === "-") return -1;
            return a.page - b.page;
        });
        
        renderTable(data);

    </script>
</body>
</html>
